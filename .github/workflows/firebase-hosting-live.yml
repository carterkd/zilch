name: Deploy Firebase Hosting

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/firebase-hosting-live.yml"
      - ".firebaserc"
      - "app.js"
      - "firebase-config.js"
      - "firebase.json"
      - "index.html"
      - "styles.css"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scoring tests
        run: node scoring.test.js

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZILCH_E6EC7 }}"
          projectId: zilch-e6ec7
          channelId: live
